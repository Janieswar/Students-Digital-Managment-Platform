<!DOCTYPE html>

    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

    <script>
        // Move Error Handling to a standard script so it works before Babel starts
        window.addEventListener('error', function(event) {
            console.error("Global Mockup Error:", event.error || event.message);
            const root = document.getElementById('root');
            if (root) {
                const errorMessage = event.error ? (event.error.stack || event.error.message) : (event.message || "Unknown Script Error");
                root.innerHTML = `
                    <div style="padding: 40px; background: #fff1f2; color: #9f1239; border: 2px solid #fda4af; border-radius: 24px; font-family: 'Inter', sans-serif; max-width: 700px; margin: 60px auto; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);">
                        <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 20px;">
                            <div style="background: #be123c; color: white; width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                            </div>
                            <h2 style="font-weight: 900; font-size: 28px; letter-spacing: -0.025em;">Mockup Initialization Failed</h2>
                        </div>
                        <p style="margin-bottom: 8px; font-weight: 700; color: #be123c;">Technical Error Details:</p>
                        <pre style="background: rgba(255,255,255,0.7); padding: 20px; border-radius: 16px; font-family: monospace; font-size: 13px; border: 1px solid #fecdd3; overflow-x: auto; white-space: pre-wrap; word-break: break-all; max-height: 300px;">${errorMessage}</pre>
                        <div style="margin-top: 24px; font-size: 14px; line-height: 1.6; color: #4b5563;">
                            <p style="font-weight: 600; margin-bottom: 8px;">Possible causes:</p>
                            <ul style="margin-left: 20px; list-style-type: disc;">
                                <li><b>Internet Connection</b>: Required to download React and Tailwind.</li>
                                <li><b>Browser</b>: Please use <b>Chrome</b> or <b>Edge</b>.</li>
                                <li><b>Local Files</b>: If using file://, Chrome may block some script features.</li>
                            </ul>
                        </div>
                        <button onclick="window.location.reload()" style="margin-top: 30px; background: #be123c; color: white; border: none; padding: 12px 28px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s;">↻ Reload Application</button>
                    </div>
                `;
            }
        });
    </script>
    <script>
        // Check if resources loaded
        window.addEventListener('load', function() {
            const resources = {
                'React': typeof React !== 'undefined',
                'ReactDOM': typeof ReactDOM !== 'undefined',
                'Babel': typeof Babel !== 'undefined',
                'Lucide': typeof lucide !== 'undefined'
            };
            const missing = Object.entries(resources).filter(([k, v]) => !v).map(([k]) => k);
            if (missing.length > 0) {
                console.error("Missing resources:", missing);
                const root = document.getElementById('root');
                if (root) {
                    root.innerHTML = `
                        <div style="padding: 40px; background: #fff1f2; color: #9f1239; border: 2px solid #fda4af; border-radius: 20px; font-family: sans-serif; max-width: 600px; margin: 40px auto; text-align: center;">
                            <h2 style="font-weight: 800; font-size: 24px;">Connection Error</h2>
                            <p style="margin-top: 10px;">The following required libraries failed to load: <b>${missing.join(', ')}</b></p>
                            <p style="margin-top: 20px; font-size: 14px;">Please check your internet connection. This mockup requires external libraries from <b>unpkg.com</b> to function.</p>
                            <button onclick="window.location.reload()" style="margin-top: 20px; background: #be123c; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 700; cursor: pointer;">Try Again</button>
                        </div>
                    `;
                }
            }
        });
    </script>

        }

</head>
<body>
    <div id="root">
        <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; background: #f8fafc; color: #64748b;">
            <div style="width: 40px; height: 40px; border: 4px solid #cbd5e1; border-top-color: #C0392B; border-radius: 50%; animation: spin 1s linear infinite;"></div>
            <p style="margin-top: 16px; font-weight: 600;">Loading Admin Dashboard Mockup...</p>
            <p style="font-size: 12px; margin-top: 4px;">Please ensure JavaScript is enabled and you are viewing this file in a web browser.</p>
        </div>
    </div>
    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>

    <script type="text/babel" data-presets="react">
        console.log("Mockup Script: Starting initialization...");
        const { useState, useEffect, useMemo } = React;

        // Custom Hook for Toasts
        const useToast = () => {
            const [toasts, setToasts] = useState([]);
            const addToast = (message, type = 'info') => {
                const id = Math.random().toString(36).substr(2, 9);
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => {
                    setToasts(prev => prev.filter(t => t.id !== id));
                }, 3000);
            };
            return { toasts, addToast };
        };

        // Icons component (React-stable version)
        const Icon = ({ name, size = 20, className = "" }) => {
            const [svgHtml, setSvgHtml] = useState("");

            useEffect(() => {
                const renderIcon = () => {
                    if (window.lucide && window.lucide.icons && window.lucide.icons[name]) {
                        const svg = window.lucide.icons[name].toSvg({
                            width: size,
                            height: size,
                            class: className,
                            'stroke-width': 2,
                            'stroke-linecap': 'round',
                            'stroke-linejoin': 'round'
                        });
                        setSvgHtml(svg);
                    } else {
                        // Retry if Lucide hasn't loaded yet
                        setTimeout(renderIcon, 50);
                    }
                };
                renderIcon();
            }, [name, size, className]);

            if (!svgHtml) return <div className={`inline-block ${className}`} style={{ width: size, height: size }}></div>;

            return <span className="inline-flex shrink-0" dangerouslySetInnerHTML={{ __html: svgHtml }} />;
        };

        // --- Auth & Layout Components ---

        const LoginPage = ({ onLogin }) => {
            const [email, setEmail] = useState("admin@cec.edu");
            const [password, setPassword] = useState("password123");
            const [isLoading, setIsLoading] = useState(false);

            const handleSubmit = (e) => {
                e.preventDefault();
                setIsLoading(true);
                // Simulate network delay
                setTimeout(() => {
                    setIsLoading(false);
                    onLogin();
                }, 1200);
            };

            return (
                <div className="min-h-screen bg-slate-100 flex items-center justify-center p-6 bg-gradient-to-br from-slate-50 to-slate-200">
                    <div className="max-w-md w-full bg-white rounded-3xl shadow-2xl border border-slate-100 p-10 animate-in zoom-in-95 duration-500">
                        <div className="flex flex-col items-center mb-10">
                            <div className="w-16 h-16 bg-[#C0392B] rounded-2xl flex items-center justify-center shadow-lg shadow-red-200 mb-6">
                                <Icon name="graduation-cap" className="text-white" size={32} />
                            </div>
                            <h1 className="text-3xl font-black text-slate-800 tracking-tight">CEC Admin</h1>
                            <p className="text-slate-500 font-medium text-sm mt-2">City Engineering College Portal</p>
                        </div>

                        <form onSubmit={handleSubmit} className="space-y-6">
                            <div>
                                <label className="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Email Address</label>
                                <div className="relative">
                                    <Icon name="mail" className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                                    <input 
                                        type="email" 
                                        required
                                        value={email}
                                        onChange={(e) => setEmail(e.target.value)}
                                        className="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:outline-none focus:ring-2 focus:ring-red-500/20 focus:bg-white transition-all shadow-sm" 
                                    />
                                </div>
                            </div>

                            <div>
                                <label className="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Password</label>
                                <div className="relative">
                                    <Icon name="lock" className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                                    <input 
                                        type="password" 
                                        required
                                        value={password}
                                        onChange={(e) => setPassword(e.target.value)}

                                    />
                                </div>
                            </div>

                            <button 
                                type="submit" 
                                disabled={isLoading}
                                className="w-full py-4 btn-primary rounded-2xl font-bold transition-all shadow-lg shadow-red-200 flex items-center justify-center gap-3 relative overflow-hidden group"

                                    <div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                                ) : (
                                    <>
                                        <span>Sign In to Dashboard</span>
                                        <Icon name="arrow-right" size={18} className="transition-transform group-hover:translate-x-1" />
                                    </>
                                )}
                            </button>
                        </form>

                        <div className="mt-8 pt-8 border-t border-slate-50 text-center">
                            <p className="text-xs text-slate-400 font-medium">Forgot your credentials? Contact IT Support.</p>
                        </div>
                    </div>
                </div>
            );
        };

        const SidebarItem = ({ icon, label, id, active, onClick }) => (
            <div

                className={`flex items-center gap-3 px-6 py-4 cursor-pointer transition-all duration-200 text-white/80 hover:text-white hover:bg-white/10 ${active ? 'sidebar-item-active text-white' : ''}`}
            >
                <Icon name={icon} />
                <span className="font-medium text-sm">{label}</span>
            </div>
        );

        // --- Pages ---

        const DashboardHome = () => (
            <div className="space-y-6 animate-in fade-in duration-500">
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                        <div className="flex justify-between items-start">
                            <div>
                                <p className="text-slate-500 text-sm font-medium">Active Users</p>
                                <h3 className="text-2xl font-bold mt-1 text-slate-800">1,284</h3>
                            </div>
                            <div className="p-2 bg-blue-50 text-blue-600 rounded-lg">
                                <Icon name="users" />
                            </div>
                        </div>
                        <div className="mt-4 flex items-center text-xs text-green-600">
                            <Icon name="trending-up" size={14} className="mr-1" />
                            <span>+4.5% from last month</span>
                        </div>
                    </div>
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                        <div className="flex justify-between items-start">
                            <div>
                                <p className="text-slate-500 text-sm font-medium">Pending Requests</p>
                                <h3 className="text-2xl font-bold mt-1 text-slate-800">42</h3>
                            </div>
                            <div className="p-2 bg-amber-50 text-amber-600 rounded-lg">
                                <Icon name="clock" />
                            </div>
                        </div>
                        <div className="mt-4 flex items-center text-xs text-slate-500">
                            <span>Requires urgent attention</span>
                        </div>
                    </div>
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                        <div className="flex justify-between items-start">
                            <div>
                                <p className="text-slate-500 text-sm font-medium">Storage Usage</p>
                                <h3 className="text-2xl font-bold mt-1 text-slate-800">64%</h3>
                            </div>
                            <div className="p-2 bg-purple-50 text-purple-600 rounded-lg">
                                <Icon name="database" />
                            </div>
                        </div>
                        <div className="mt-4 w-full bg-slate-100 rounded-full h-1.5 overflow-hidden">
                            <div className="bg-purple-600 h-full" style={{ width: '64%' }}></div>
                        </div>
                    </div>
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                        <div className="flex justify-between items-start">
                            <div>
                                <p className="text-slate-500 text-sm font-medium">System Uptime</p>
                                <h3 className="text-2xl font-bold mt-1 text-slate-800">99.9%</h3>
                            </div>
                            <div className="p-2 bg-green-50 text-green-600 rounded-lg">
                                <Icon name="activity" />
                            </div>
                        </div>
                        <div className="mt-4 flex items-center text-xs text-green-600">
                            <span>Service: Stable</span>
                        </div>
                    </div>
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div className="lg:col-span-2 bg-white rounded-xl shadow-sm border border-slate-100 p-6">
                        <h4 className="font-bold text-slate-800 mb-6 flex items-center gap-2">
                            <Icon name="history" size={18} /> Recent Activity Feed
                        </h4>
                        <div className="space-y-6">
                            {[
                                { user: "Dr. Ananya Sharma", action: "published new course material", target: "Data Structures (CS301)", time: "10 mins ago" },
                                { user: "Admin", action: "approved fee waiver for", target: "Rahul Verma (1CE22AI045)", time: "45 mins ago" },
                                { user: "Pooja Hegde", action: "submitted a grievance regarding", target: "Library access hours", time: "2 hours ago" },
                                { user: "Prof. Rajesh Kumar", action: "updated attendance for", target: "Section B - DBMS", time: "5 hours ago" }
                            ].map((item, i) => (
                                <div key={i} className="flex gap-4 border-l-2 border-slate-100 pl-4 py-1 relative">
                                    <div className="absolute -left-1.5 top-2 w-3 h-3 rounded-full bg-slate-300 border-2 border-white"></div>
                                    <div>
                                        <p className="text-sm text-slate-600">
                                            <span className="font-semibold text-slate-800">{item.user}</span> {item.action} <span className="font-medium text-slate-700">{item.target}</span>

                                    </div>

                        </div>
                    </div>
                    <div className="bg-white rounded-xl shadow-sm border border-slate-100 p-6">
                        <h4 className="font-bold text-slate-800 mb-6">System Health</h4>
                        <div className="space-y-4">
                            <div className="flex justify-between items-center bg-slate-50 p-3 rounded-lg">
                                <div className="flex items-center gap-3">
                                    <div className="w-2 h-2 rounded-full bg-green-500"></div>
                                    <span className="text-sm font-medium text-slate-600">Database Cluster</span>
                                </div>
                                <span className="text-xs font-bold text-green-600">HEALTHY</span>
                            </div>
                            <div className="flex justify-between items-center bg-slate-50 p-3 rounded-lg">
                                <div className="flex items-center gap-3">
                                    <div className="w-2 h-2 rounded-full bg-green-500"></div>

                                </div>

                            </div>

        );

        const UserManagement = ({ users, setUsers, onAction }) => {
            const [searchTerm, setSearchTerm] = useState("");
            const [isAddingUser, setIsAddingUser] = useState(false);
            const [newUser, setNewUser] = useState({ name: "", email: "", role: "Student", dept: "CSE", status: "Active" });

            const handleAddUser = (e) => {
                e.preventDefault();
                const id = "U" + Math.floor(Math.random() * 900 + 100);
                setUsers([...users, { id, ...newUser }]);
                setIsAddingUser(false);
                setNewUser({ name: "", email: "", role: "Student", dept: "CSE", status: "Active" });
                onAction("User " + newUser.name + " added successfully!");
            };

            return (
                <div className="space-y-6">
                    {isAddingUser && (
                        <div className="bg-white p-6 rounded-xl border-2 border-red-100 shadow-xl animate-in zoom-in-95 duration-200">

                                <div>
                                    <label className="block text-[10px] font-black uppercase text-slate-400 tracking-widest mb-2">Email Address</label>

                                    <label className="block text-[10px] font-black uppercase text-slate-400 tracking-widest mb-2">Role Type</label>
                                    <select value={newUser.role} onChange={e => setNewUser({...newUser, role: e.target.value})} className="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-xl outline-none">

                                        <option>Admin</option>

                                    <label className="block text-[10px] font-black uppercase text-slate-400 tracking-widest mb-2">Department</label>

                                        <option>ECE</option>
                                        <option>ME</option>
                                        <option>AI&ML</option>
                                    </select>
                                </div>
                                <div className="lg:col-span-2 flex items-end gap-3">
                                    <button type="submit" className="flex-1 py-3 btn-primary rounded-xl font-bold shadow-lg shadow-red-200">Save User Account</button>

                            </form>

                    )}

                    <div className="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden animate-in fade-in duration-500">

    <script>
        // Safety check: ensure root doesn't stay blank
        window.addEventListener('load', () => {
            setTimeout(() => {
                const root = document.getElementById('root');
                if (root && root.innerText.includes('Loading')) {
                    console.warn("Mockup still loading after 10s... showing backup UI.");
                    // Only show backup if we are SURE it's stuck
                    if (!window.ReactDOM) {
                         root.innerHTML = `<div style="padding: 20px; text-align: center; color: #ef4444;"><h1>Loading Failed</h1><p>Internet connection issue detected.</p></div>`;

                }
