<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEC Faculty Dashboard - High Fidelity Mockup</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest" crossorigin></script>
    
    <script>
        window.addEventListener('error', function(event) {
            console.error("Global Mockup Error:", event.error || event.message);
            const root = document.getElementById('root');
            if (root) {
                const errorMessage = event.error ? (event.error.stack || event.error.message) : (event.message || "Unknown Script Error");
                root.innerHTML = `
                    <div style="padding: 40px; background: #fff1f2; color: #9f1239; border: 2px solid #fda4af; border-radius: 24px; font-family: 'Inter', sans-serif; max-width: 700px; margin: 60px auto; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);">
                        <h2 style="font-weight: 900; font-size: 28px;">Faculty Portal Error</h2>
                        <pre style="background: rgba(255,255,255,0.7); padding: 20px; border-radius: 16px; font-size: 13px; margin-top:10px; overflow:auto;">${errorMessage}</pre>
                        <button onclick="window.location.reload()" style="margin-top: 30px; background: #be123c; color: white; border: none; padding: 12px 28px; border-radius: 12px; font-weight: 700; cursor: pointer;">↻ Reload</button>
                    </div>
                `;
            }
        });
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .sidebar { background-color: #1e293b; }
        .sidebar-item-active { background-color: rgba(255, 255, 255, 0.1); border-left: 4px solid #38bdf8; }
        .btn-faculty { background-color: #334155; color: white; }
        .btn-primary-blue { background-color: #0284c7; color: white; }
        .badge-locked { background-color: #f1f5f9; color: #64748b; border: 1px dashed #cbd5e1; }
        .badge-at-risk { background-color: #fef2f2; color: #dc2626; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); }
    </style>
</head>
<body>
    <div id="root">
        <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif;">
            <div style="width: 40px; height: 40px; border: 4px solid #cbd5e1; border-top-color: #0284c7; border-radius: 50%; animation: spin 1s linear infinite;"></div>
            <p style="margin-top: 16px; font-weight: 600; color: #64748b;">Loading Faculty Dashboard Mockup...</p>
        </div>
    </div>
    <style> @keyframes spin { to { transform: rotate(360deg); } } </style>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect, useMemo } = React;

        // Custom Hook for Toasts
        const useToast = () => {
            const [toasts, setToasts] = useState([]);
            const addToast = (message, type = 'info') => {
                const id = Math.random().toString(36).substr(2, 9);
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
            };
            return { toasts, addToast };
        };

        // Reusable Dialog/Modal Component
        const Dialog = ({ isOpen, onClose, title, children, footer }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                    <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={onClose}></div>
                    <div className="bg-white rounded-3xl shadow-2xl w-full max-w-lg relative z-10 overflow-hidden animate-in zoom-in-95 duration-200">
                        <div className="p-6 border-b border-slate-50 flex justify-between items-center bg-slate-50/50">
                            <h3 className="font-bold text-slate-800 text-lg uppercase tracking-tight">{title}</h3>
                            <button onClick={onClose} className="p-2 hover:bg-slate-200 rounded-xl transition-colors">
                                <Icon name="x" size={20} className="text-slate-500" />
                            </button>
                        </div>
                        <div className="p-8">
                            {children}
                        </div>
                        {footer && (
                            <div className="p-6 bg-slate-50/50 border-t border-slate-50 flex justify-end gap-3">
                                {footer}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // Icons component (React-stable)
        const Icon = ({ name, size = 20, className = "" }) => {
            const [svgHtml, setSvgHtml] = useState("");
            useEffect(() => {
                const render = () => {
                    if (window.lucide && window.lucide.icons[name]) {
                        setSvgHtml(window.lucide.icons[name].toSvg({ width: size, height: size, class: className, 'stroke-width': 2 }));
                    } else { setTimeout(render, 50); }
                };
                render();
            }, [name, size, className]);
            if (!svgHtml) return <div className={`inline-block ${className}`} style={{ width: size, height: size }}></div>;
            return <span className="inline-flex shrink-0" dangerouslySetInnerHTML={{ __html: svgHtml }} />;
        };

        // --- Pages ---
        
        const DashboardHome = ({ students, announcements, onAction }) => {
            const stats = {
                pendingGrading: 12,
                gradingDeadline: "IA-2 ends in 2 days",
                avgAttendance: Math.round(students.reduce((acc, s) => acc + parseInt(s.attendanceRate), 0) / students.length),
                atRiskCount: students.filter(s => parseInt(s.attendanceRate) < 75).length
            };

            const schedule = [
                { time: "09:00 AM", course: "Data Structures", type: "Lecture", section: "CSE-3A", room: "LT-201" },
                { time: "11:30 AM", course: "Algo Design", type: "Lab", section: "CSE-3B", room: "LAB-4" },
                { time: "02:30 PM", course: "Discrete Math", type: "Tutorial", section: "CSE-3A", room: "LT-102" }
            ];

            const alerts = students
                .filter(s => parseInt(s.attendanceRate) < 75)
                .map(s => ({
                    student: s.name,
                    usn: s.usn,
                    reason: `Low Attendance: ${s.attendanceRate}`,
                    priority: parseInt(s.attendanceRate) < 70 ? 'High' : 'Medium'
                }));

            return (
                <div className="space-y-6 animate-in fade-in duration-500">
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                            <p className="text-slate-500 text-sm font-medium">Pending Gradings</p>
                            <h3 className="text-3xl font-extrabold mt-1 text-slate-800">{stats.pendingGrading}</h3>
                            <p className="text-xs text-amber-600 font-semibold mt-2 flex items-center gap-1">
                                <Icon name="clock" size={12} /> {stats.gradingDeadline}
                            </p>
                        </div>
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                            <p className="text-slate-500 text-sm font-medium">Avg. Attendance</p>
                            <h3 className="text-3xl font-extrabold mt-1 text-slate-800">{stats.avgAttendance}%</h3>
                            <p className="text-xs text-green-600 font-semibold mt-2">Satisfactory</p>
                        </div>
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                            <p className="text-slate-500 text-sm font-medium">At-Risk Students</p>
                            <h3 className="text-3xl font-extrabold mt-1 text-red-600">{stats.atRiskCount}</h3>
                            <p className="text-xs text-red-500 font-semibold mt-2 flex items-center gap-1">
                                <Icon name="alert-triangle" size={12} /> Requires urgent warnings
                            </p>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                            <div className="p-5 border-b border-slate-50 bg-slate-50/50 flex justify-between items-center">
                                <h4 className="font-bold text-slate-800 flex items-center gap-2">
                                    <Icon name="calendar" size={18} className="text-sky-500" /> Today's Schedule
                                </h4>
                                <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Mar 15, 2026</span>
                            </div>
                            <div className="p-5 space-y-4">
                                {schedule.map((slot, i) => (
                                    <div key={i} className="flex gap-4 p-4 rounded-xl border border-slate-100 hover:border-sky-200 hover:bg-sky-50/30 transition-all cursor-pointer group">
                                        <div className="text-center w-20">
                                            <p className="text-xs font-bold text-slate-400">{slot.time.split(' ')[1]}</p>
                                            <p className="text-lg font-black text-slate-800 leading-none mt-1">{slot.time.split(' ')[0]}</p>
                                        </div>
                                        <div className="flex-1 py-1">
                                            <div className="flex justify-between">
                                                <h5 className="font-bold text-slate-800">{slot.course}</h5>
                                                <span className="text-[10px] px-2 py-0.5 rounded-full bg-slate-100 text-slate-600 font-bold uppercase">{slot.type}</span>
                                            </div>
                                            <p className="text-xs text-slate-500 mt-1 flex items-center gap-4">
                                                <span className="flex items-center gap-1"><Icon name="users" size={12}/> {slot.section}</span>
                                                <span className="flex items-center gap-1"><Icon name="map-pin" size={12}/> {slot.room}</span>
                                            </p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                            <div className="p-5 border-b border-slate-50 bg-slate-50/50 flex justify-between items-center">
                                <h4 className="font-bold text-slate-800 flex items-center gap-2">
                                    <Icon name="bell" size={18} className="text-orange-500" /> Alerts & Risks
                                </h4>
                            </div>
                            <div className="p-5 space-y-4">
                                 {alerts.map((alert, i) => (
                                    <div key={i} className={`p-4 rounded-xl border flex items-center justify-between ${alert.priority === 'High' ? 'border-red-100 bg-red-50/30' : 'border-amber-100 bg-amber-50/30'}`}>
                                        <div>
                                            <p className="text-sm font-bold text-slate-800">{alert.student}</p>
                                            <p className="text-xs text-slate-500 font-medium tracking-tight mt-0.5">{alert.usn} • {alert.reason}</p>
                                        </div>
                                        <button 
                                            onClick={() => onAction(`Warning notification sent to ${alert.student}.`)}
                                            className={`text-xs font-bold px-3 py-1.5 rounded-lg shadow-sm transition-all hover:scale-105 ${alert.priority === 'High' ? 'bg-red-600 text-white' : 'bg-amber-500 text-white'}`}
                                        >
                                            Warn Student
                                        </button>
                                    </div>
                                ))}
                                {alerts.length === 0 && (
                                    <div className="py-10 text-center">
                                        <div className="w-12 h-12 bg-green-50 text-green-500 rounded-full flex items-center justify-center mx-auto mb-3">
                                            <Icon name="check" size={24} />
                                        </div>
                                        <p className="text-sm font-medium text-slate-400">All students currently above 75% threshold.</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const Gradebook = ({ students, onUpdateGrade, onAction }) => {
             const [editingStudent, setEditingStudent] = useState(null);

             return (
                 <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden animate-in fade-in duration-500">
                     <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-white sticky top-0 z-10">
                         <div>
                             <h4 className="font-bold text-slate-800 text-lg uppercase">Gradebook: Data Structures</h4>
                             <p className="text-xs text-slate-500 font-medium tracking-tight">Management of IA Marks and Assignments</p>
                         </div>
                         <button className="flex items-center gap-2 px-6 py-2.5 btn-primary-blue rounded-xl text-sm font-bold shadow-xl shadow-sky-100 hover:scale-105 transition-all">
                             <Icon name="download" size={16} /> Export Reports
                         </button>
                     </div>
                     
                     <div className="overflow-x-auto">
                         <table className="w-full text-left">
                             <thead className="bg-slate-50/80 text-slate-500 text-[10px] font-black uppercase tracking-widest border-b border-slate-100">
                                 <tr>
                                     <th className="px-6 py-5">Student</th>
                                     <th className="px-6 py-5 text-center">IA-1 (25)</th>
                                     <th className="px-6 py-5 text-center">IA-2 (25)</th>
                                     <th className="px-6 py-5 text-center">Assign (25)</th>
                                     <th className="px-6 py-5">Faculty Notes</th>
                                     <th className="px-6 py-5 text-right">Actions</th>
                                 </tr>
                             </thead>
                             <tbody className="divide-y divide-slate-50 text-sm">
                                 {students.map(s => (
                                     <tr key={s.id} className="hover:bg-slate-50/50 transition-colors">
                                         <td className="px-6 py-4">
                                             <p className="font-bold text-slate-800 leading-tight">{s.name}</p>
                                             <p className="text-[10px] text-slate-400 font-mono mt-0.5">{s.usn}</p>
                                         </td>
                                         <td className="px-6 py-4 text-center">
                                            <div className="flex flex-col items-center gap-1">
                                                <span className={`font-black ${s.locked ? 'text-slate-400' : 'text-slate-700'}`}>{s.ia1 ?? '--'}</span>
                                                {s.locked && <span className="text-[8px] font-black text-slate-300 uppercase tracking-tighter bg-slate-100 px-1 rounded">Locked</span>}
                                            </div>
                                         </td>
                                         <td className="px-6 py-4 text-center font-black text-slate-700">{s.ia2 ?? '--'}</td>
                                         <td className="px-6 py-4 text-center font-black text-slate-700">{s.assignments ?? '--'}</td>
                                         <td className="px-6 py-4">
                                             <p className="text-xs italic text-slate-500 max-w-[150px] truncate">{s.facultyNote || 'No notes'}</p>
                                         </td>
                                         <td className="px-6 py-4 text-right">
                                             <button 
                                                 onClick={() => setEditingStudent(s)}
                                                 className="p-2 text-slate-400 hover:text-sky-600 hover:bg-sky-50 rounded-lg transition-all"
                                             >
                                                 <Icon name="edit-3" size={18} />
                                             </button>
                                         </td>
                                     </tr>
                                 ))}
                             </tbody>
                         </table>
                     </div>

                     <Dialog 
                         isOpen={!!editingStudent} 
                         onClose={() => setEditingStudent(null)} 
                         title={`Edit Grades: ${editingStudent?.name}`}
                         footer={
                             <div className="flex gap-3">
                                 <button onClick={() => setEditingStudent(null)} className="px-6 py-2.5 border border-slate-200 rounded-xl text-sm font-bold text-slate-600 hover:bg-slate-50">Cancel</button>
                                 <button 
                                     onClick={() => {
                                         const updated = { 
                                             ...editingStudent, 
                                             ia1: Number(document.getElementById('edit-ia1').value),
                                             ia2: Number(document.getElementById('edit-ia2').value),
                                             assignments: Number(document.getElementById('edit-assign').value),
                                             facultyNote: document.getElementById('edit-note').value
                                         };
                                         onUpdateGrade(updated);
                                         setEditingStudent(null);
                                         onAction(`Grades updated for ${editingStudent.name}`);
                                     }}
                                     className="px-6 py-2.5 btn-primary-blue rounded-xl text-sm font-bold shadow-lg shadow-sky-100"
                                 >
                                     Save Changes
                                 </button>
                             </div>
                         }
                     >
                         <div className="space-y-6">
                             <div className="grid grid-cols-3 gap-6">
                                 <div>
                                     <label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">IA-1 (25)</label>
                                     <div className="relative">
                                         <input 
                                             id="edit-ia1"
                                             type="number" 
                                             disabled={editingStudent?.locked}
                                             defaultValue={editingStudent?.ia1}
                                             className={`w-full px-4 py-3 rounded-xl border font-bold focus:outline-none transition-all ${editingStudent?.locked ? 'bg-slate-100 text-slate-400 border-slate-100 cursor-not-allowed' : 'border-slate-200 focus:ring-4 focus:ring-sky-500/10 focus:border-sky-500'}`}
                                         />
                                         {editingStudent?.locked && <div className="absolute -top-3 -right-2 bg-slate-900 text-white text-[8px] font-bold px-2 py-0.5 rounded-full shadow-lg border border-white/20">Locked by Admin</div>}
                                     </div>
                                 </div>
                                 <div>
                                     <label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">IA-2 (25)</label>
                                     <input 
                                         id="edit-ia2"
                                         type="number" 
                                         defaultValue={editingStudent?.ia2}
                                         className="w-full px-4 py-3 rounded-xl border border-slate-200 font-bold focus:ring-4 focus:ring-sky-500/10 focus:border-sky-500 outline-none transition-all"
                                     />
                                 </div>
                                 <div>
                                     <label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Assign (25)</label>
                                     <input 
                                         id="edit-assign"
                                         type="number" 
                                         defaultValue={editingStudent?.assignments}
                                         className="w-full px-4 py-3 rounded-xl border border-slate-200 font-bold focus:ring-4 focus:ring-sky-500/10 focus:border-sky-500 outline-none transition-all"
                                     />
                                 </div>
                             </div>
                             <div>
                                 <label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Faculty Notes (Private)</label>
                                 <textarea 
                                     id="edit-note"
                                     rows="3" 
                                     defaultValue={editingStudent?.facultyNote}
                                     placeholder="Add private observations about this student..."
                                     className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-sky-500/10 focus:border-sky-500 outline-none transition-all text-sm font-medium"
                                 ></textarea>
                             </div>
                         </div>
                     </Dialog>
                 </div>
             );
        };

        const Attendance = ({ students, onMark, onAction }) => {
            const [isQRModalOpen, setQRModalOpen] = useState(false);
            const [qrTime, setQRTime] = useState(120);

            useEffect(() => {
                let timer;
                if (isQRModalOpen && qrTime > 0) {
                    timer = setInterval(() => setQRTime(prev => prev - 1), 1000);
                }
                return () => clearInterval(timer);
            }, [isQRModalOpen, qrTime]);

            return (
                <div className="space-y-6 animate-in slide-in-from-bottom-5 duration-500">
                    <div className="bg-white p-8 rounded-2xl shadow-sm border border-slate-100 flex flex-col md:flex-row items-center justify-between gap-6">
                        <div className="flex items-center gap-6">
                            <div className="w-16 h-16 bg-sky-500 text-white rounded-2xl flex items-center justify-center shadow-lg shadow-sky-100">
                                <Icon name="qr-code" size={32} />
                            </div>
                            <div>
                                <h4 className="text-xl font-extrabold text-slate-800">New Session: Data Structures</h4>
                                <p className="text-slate-500 font-medium">CSE 3rd Sem • Section A • LT-201</p>
                            </div>
                        </div>
                        <div className="flex gap-4 w-full md:w-auto">
                            <button className="flex-1 md:flex-none px-8 py-3 btn-faculty rounded-xl font-bold hover:bg-slate-700 transition-all">Manual Register</button>
                            <button 
                                onClick={() => { setQRModalOpen(true); setQRTime(120); }}
                                className="flex-1 md:flex-none px-8 py-3 bg-sky-600 text-white rounded-xl font-bold hover:bg-sky-700 shadow-xl shadow-sky-100 transition-all border-b-4 border-sky-800 active:border-b-0 active:translate-y-1"
                            >
                                Generate QR Code
                            </button>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div className="lg:col-span-2 bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                            <div className="p-6 border-b border-slate-100 bg-white sticky top-0 z-10 flex justify-between items-center">
                                <h4 className="font-bold text-slate-800 uppercase tracking-widest text-sm">Attendance Register</h4>
                                 <div className="flex items-center gap-2 bg-slate-50 px-3 py-1.5 rounded-lg border border-slate-100">
                                    <Icon name="search" size={14} className="text-slate-400" />
                                    <input type="text" placeholder="Search student..." className="bg-transparent text-xs outline-none w-32 font-bold" />
                                 </div>
                            </div>
                            <div className="p-0 border-t border-slate-50 divide-y divide-slate-50">
                                {students.map((s, i) => (
                                    <div key={i} className="flex items-center justify-between px-6 py-4 hover:bg-slate-50/50 transition-all group">
                                        <div className="flex items-center gap-4">
                                            <div className={`w-11 h-11 rounded-xl flex items-center justify-center font-black text-sm shadow-sm ${parseInt(s.attendanceRate) < 75 ? 'bg-red-50 text-red-600' : 'bg-slate-100 text-slate-500'}`}>
                                                {s.name.split(' ').map(n=>n[0]).join('')}
                                            </div>
                                            <div>
                                                <p className="text-sm font-bold text-slate-800">{s.name}</p>
                                                <p className="text-[10px] font-mono font-bold text-slate-400 tracking-tighter uppercase">{s.usn}</p>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-8">
                                            <div className="text-right">
                                                <p className="text-xs font-bold text-slate-400">Rate</p>
                                                <p className={`text-sm font-black ${parseInt(s.attendanceRate) < 75 ? 'text-red-600' : 'text-slate-700'}`}>{s.attendanceRate}</p>
                                            </div>
                                            <div className="flex gap-1 bg-slate-100 p-1 rounded-xl">
                                                {['Present', 'Absent', 'Late'].map(st => (
                                                    <button 
                                                        key={st} 
                                                        onClick={() => {
                                                            onMark(s.id, st);
                                                            onAction(`${s.name} marked as ${st}`);
                                                        }}
                                                        className={`w-9 h-9 rounded-lg flex items-center justify-center text-[11px] font-black transition-all ${
                                                            s.status === st ? 
                                                            (st === 'Present' ? 'bg-green-600 text-white shadow-lg' : st === 'Absent' ? 'bg-red-600 text-white shadow-lg' : 'bg-amber-500 text-white shadow-lg') : 
                                                            'text-slate-400 hover:text-slate-600'
                                                        }`}
                                                    >
                                                        {st[0]}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-8 h-fit">
                            <h4 className="font-bold text-slate-800 mb-6 uppercase tracking-widest text-xs">Summary View</h4>
                            <div className="space-y-4">
                                <div className="p-4 rounded-xl bg-green-50/50 border border-green-100 flex justify-between items-center group cursor-pointer hover:bg-green-50 transition-colors">
                                    <span className="text-xs font-bold text-green-700">Present</span>
                                    <span className="text-lg font-black text-green-700">{students.filter(s=>s.status==='Present').length}</span>
                                </div>

            const [announcements, setAnnouncements] = useState([
                { id: 1, subject: "IA-2 Mark Revision", content: "Students who have issues with IA-2 marks can meet me in the staff room between 2-3 PM tomorrow.", sections: ["CSE-3A"], status: "Published", date: "Mar 12, 2026" },
                { id: 2, subject: "Guest Lecture: AI Trends", content: "Mandatory guest lecture for all 3rd-year students in Seminar Hall.", sections: ["CSE-3A", "CSE-3B"], status: "Published", date: "Mar 11, 2026" }
            ]);

            // Handlers
            const updateGrade = (id, field, value) => {
                setStudents(prev => prev.map(s => s.id === id ? { ...s, [field]: value } : s));
            };

            const markAttendance = (id, status) => {
                setStudents(prev => prev.map(s => s.id === id ? { ...s, status } : s));
            };

            const addResource = (res) => setResources([res, ...resources]);
            const deleteResource = (id) => setResources(resources.filter(r => r.id !== id));
            const addAnnouncement = (ann) => setAnnouncements([ann, ...announcements]);

            const menu = [
                { id: "dashboard", label: "Overview", icon: "layout-dashboard" },
                { id: "gradebook", label: "Gradebook", icon: "book-open" },
                { id: "attendance", label: "Attendance", icon: "calendar-check" },
                { id: "content", label: "Course Content", icon: "folder-open" },
                { id: "announcements", label: "Announcements", icon: "megaphone" },
                { id: "messaging", label: "Messaging", icon: "message-square" },
            ];

            const currentTitle = menu.find(m => m.id === activeTab)?.label;

            useEffect(() => {
                console.log(`Faculty Portal: isLoggedIn=${isLoggedIn}, panel=${activeTab}`);
            }, [activeTab, isLoggedIn]);

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen bg-slate-900 flex items-center justify-center p-6 bg-[url('https://www.transparenttextures.com/patterns/dark-matter.png')]">
                        <div className="max-w-md w-full bg-white rounded-3xl shadow-2xl p-10 animate-in zoom-in-95 duration-500 border-4 border-sky-500/10">
                            <div className="flex flex-col items-center mb-8">
                                <div className="w-16 h-16 bg-sky-600 rounded-2xl flex items-center justify-center shadow-2xl shadow-sky-200 mb-6">
                                    <Icon name="graduation-cap" className="text-white" size={32} />
                                </div>
                                <h1 className="text-3xl font-black text-slate-900 tracking-tight">CEC Faculty</h1>
                                <p className="text-slate-500 font-bold text-xs uppercase tracking-widest mt-2">Academic Management System</p>
                            </div>
                            <div className="space-y-6">
                                <div className="p-4 bg-sky-50 rounded-2xl border border-sky-100">
                                    <p className="text-xs font-bold text-sky-800 text-center uppercase tracking-widest">Faculty Credentials</p>
                                    <div className="mt-2 flex justify-between px-4">
                                        <code className="text-[10px] font-black text-sky-600">faculty@cec.edu</code>
                                        <code className="text-[10px] font-black text-sky-600">password123</code>
                                    </div>
                                </div>
                                <button 
                                    onClick={() => { setIsLoggedIn(true); addToast("Faculty Profile Loaded: Dr. Sathish Kumar"); }}
                                    className="w-full py-4 bg-sky-600 text-white rounded-2xl font-black shadow-xl shadow-sky-200 hover:scale-[1.02] transition-all flex items-center justify-center gap-3"
                                >
                                    Log In to Faculty Portal <Icon name="chevron-right" size={18} />
                                </button>
                                <p className="text-[10px] text-center text-slate-400 font-bold uppercase tracking-widest">Only authorized faculty members may proceed.</p>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div key="faculty-layout" className="flex min-h-screen">
                    <div className={`${isSidebarOpen ? 'w-64' : 'w-0 overflow-hidden'} sidebar transition-all duration-300 flex flex-col fixed h-full z-20`}>
                        <div className="p-8">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-sky-500 rounded-xl flex items-center justify-center shadow-lg shadow-sky-500/20">
                                    <Icon name="graduation-cap" className="text-white" size={24} />
                                </div>
                                <div className="text-white">
                                    <h1 className="font-black text-xl leading-none">CEC</h1>
                                    <p className="text-[9px] font-black text-sky-400 opacity-60 tracking-widest mt-1 uppercase">Faculty Portal</p>
                                </div>
                            </div>
                        </div>
                        <div className="mt-4 flex-1 overflow-y-auto no-scrollbar">
                            {menu.map(item => (
                                <SidebarItem key={item.id} {...item} active={activeTab === item.id} onClick={setActiveTab} />
                            ))}
                        </div>
                        <div className="p-8 border-t border-white/5">
                             <p className="text-[9px] font-black text-slate-500 uppercase text-center tracking-tighter">Powered by Smart LMS v4.2</p>
                        </div>
                    </div>

                    <div className={`flex-1 flex flex-col transition-all duration-300 ${isSidebarOpen ? 'ml-64' : 'ml-0'}`}>
                        <header className="h-20 bg-white/80 border-b border-slate-100 flex items-center justify-between px-8 sticky top-0 z-10 glass">
                            <div className="flex items-center gap-6">
                                <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-2 hover:bg-slate-50 rounded-xl text-slate-500 transition-colors">
                                    <Icon name={isSidebarOpen ? "chevrons-left" : "menu"} size={22} />
                                </button>
                                <h2 className="font-extrabold text-slate-800 text-lg uppercase tracking-tight">{currentTitle}</h2>
                            </div>
                            <div className="flex items-center gap-6">
                                <div className="hidden md:flex items-center gap-3 pr-6 border-r border-slate-100">
                                     <div className="text-right">
                                         <p className="text-sm font-black text-slate-800">Dr. Sathish Kumar</p>
                                         <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest text-right">Professor • CSE</p>
                                     </div>
                                     <div className="w-11 h-11 rounded-2xl bg-gradient-to-br from-sky-500 to-sky-700 p-0.5 shadow-md">
                                         <div className="w-full h-full bg-white rounded-[14px] flex items-center justify-center font-black text-sky-600 text-xs">SK</div>
                                     </div>
                                </div>
                                <button onClick={() => { setIsLoggedIn(false); addToast("Logged out from Faculty Portal"); }} className="p-3 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition-all">
                                    <Icon name="log-out" size={20} />
                                </button>
                            </div>
                        </header>

                        <main className="p-8 pb-20 max-w-7xl mx-auto w-full">
                            {activeTab === 'dashboard' && <DashboardHome students={students} announcements={announcements} />}
                            {activeTab === 'gradebook' && <Gradebook students={students} onUpdateGrade={updateGrade} onAction={addToast} />}
                            {activeTab === 'attendance' && <Attendance students={students} onMark={markAttendance} onAction={addToast} />}
                            {activeTab === 'content' && <CourseContent resources={resources} onAddResource={addResource} onDeleteResource={deleteResource} onAction={addToast} />}
                            {activeTab === 'announcements' && <Announcements announcements={announcements} onAddAnnouncement={addAnnouncement} onAction={addToast} />}
                            {activeTab === 'messaging' && <Messaging students={students} onAction={addToast} />}
                        </main>
                    </div>

                    <div className="fixed bottom-8 right-8 z-[100] flex flex-col gap-3">
                        {toasts.map(t => (
                            <div key={t.id} className="bg-slate-900/95 backdrop-blur-md text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 animate-in slide-in-from-right-10 duration-300 border border-white/10">
                                <Icon name="check-circle" className="text-sky-400" size={18} />
                                <span className="text-sm font-bold tracking-tight">{t.message}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
